<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Crypto Dashboard</title>

<style>

body{
background:#111;
color:white;
font-family:Arial,sans-serif;
padding:15px;
margin:0;
}

h1{
text-align:center;
font-size:32px;
margin-bottom:20px;
}

.info{
font-size:15px;
line-height:1.6;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:10px;
margin-bottom:20px;
background:#ddd;
color:#007aff;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
padding:10px 3px;
border-bottom:2px solid #333;
}

td{
padding:10px 3px;
border-bottom:1px solid #333;
text-align:center;
}

.verde{
color:#00ff88;
font-weight:bold;
}

.rojo{
color:#ff6666;
font-weight:bold;
}

.ranking{
margin-top:30px;
}

.ranking h2{
font-size:24px;
}

.ranking div{
padding:8px 0;
border-bottom:1px solid #333;
font-size:16px;
}

</style>
</head>

<body>

<h1>Crypto Dashboard</h1>

<div id="horas" class="info"></div>

<button onclick="actualizarBase()">
Actualizar Base Ahora
</button>

<table>

<thead>
<tr>
<th>Activo</th>
<th>🚦</th>
<th>Actual</th>
<th>Base</th>
<th>USD</th>
<th>%</th>
<th>Fuerza</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<div class="ranking">
<h2>🏆 Ranking de Fuerza</h2>
<div id="ranking"></div>
</div>

<script>
const activos=[
"AAVEUSDT",
"AVAXUSDT",
"BTCUSDT",
"CRVUSDT",
"DOTUSDT",
"ETHUSDT",
"LTCUSDT",
"PENGUUSDT",
"ROSEUSDT",
"SOLUSDT",
"TAOUSDT",
"XRPUSDT"
];

let ultimoPrecio={};
let tablaCreada=false;

function formato(v){

if(v>=1000){
return Number(v).toLocaleString(
"es-CO",
{
minimumFractionDigits:2,
maximumFractionDigits:2
}
);
}

if(v>=1){
return Number(v).toLocaleString(
"es-CO",
{
minimumFractionDigits:2,
maximumFractionDigits:4
}
);
}

return Number(v).toLocaleString(
"es-CO",
{
minimumFractionDigits:6,
maximumFractionDigits:6
}
);

}

async function cargar(){

let base=
JSON.parse(
localStorage.getItem("base")
);

let baseHora=
localStorage.getItem("baseHora");

if(!base){

base={};

for(let activo of activos){

const r=
await fetch(
https://api.binance.com/api/v3/ticker/price?symbol=${activo}
);

const d=
await r.json();

base[activo]=
parseFloat(d.price);

}

localStorage.setItem(
"base",
JSON.stringify(base)
);

baseHora=
Date.now();

localStorage.setItem(
"baseHora",
baseHora
);

}

const tabla=
document.getElementById("tabla");

if(!tablaCreada){

for(let activo of activos){

ultimoPrecio[activo]=
base[activo];

tabla.innerHTML+=`

<tr>
<td>
${activo.replace("USDT","")}
</td>
<td id="sem_${activo}">
⚪
</td>
<td id="precio_${activo}">
${formato(base[activo])}
</td>
<td>
${formato(base[activo])}
</td>
<td id="usd_${activo}">
0
</td>
<td id="pct_${activo}">
0%
</td>
<td id="fuerza_${activo}">
🟡 Neutral
</td>
</tr>

`;

}

tablaCreada=true;

}

actualizarDatos();

actualizarHoras();

}

async function actualizarDatos(){

let base=
JSON.parse(
localStorage.getItem("base")
);

let ranking=[];

for(let activo of activos){

const r=
await fetch(
https://api.binance.com/api/v3/ticker/price?symbol=${activo}
);

const d=
await r.json();

const actual=
parseFloat(d.price);

const valorBase=
base[activo];

const usd=
actual-valorBase;

const pct=
(usd/valorBase)*100;

let semaforo="⚪";

if(actual>ultimoPrecio[activo]){
semaforo="🟢";
}

if(actual<ultimoPrecio[activo]){
semaforo="🔴";
}

document.getElementById(
"sem_"+activo
).innerHTML=semaforo;

document.getElementById(
"precio_"+activo
).innerHTML=formato(actual);

document.getElementById(
"usd_"+activo
).innerHTML=
(usd>0?"+":"")
+
formato(usd);

document.getElementById(
"pct_"+activo
).innerHTML=
pct.toFixed(2)+"%";

let fuerzaTxt="";
let tendenciaTxt="";

if(pct>=5){

fuerzaTxt="🔥 Muy Fuerte";
tendenciaTxt="🔥 Explosiva";

}else if(pct>=2){

fuerzaTxt="🟢 Fuerte";
tendenciaTxt="🟢 Alcista Fuerte";

}else if(pct>=0){

fuerzaTxt="🟡 Neutral";
tendenciaTxt="🟡 Alcista";

}else if(pct>-3){

fuerzaTxt="🟠 Débil";
tendenciaTxt="🟠 Bajista";

}else{

fuerzaTxt="🔴 Muy Débil";
tendenciaTxt="🔴 Bajista Fuerte";

}

document.getElementById(
"fuerza_"+activo
).innerHTML=fuerzaTxt;

ultimoPrecio[activo]=actual;

ranking.push({
activo,
pct,
fuerza:fuerzaTxt
});

}

ranking.sort(
(a,b)=>b.pct-a.pct
);

document.getElementById(
"ranking"
).innerHTML=

ranking.map((r,i)=>

${i+1}. ${r.activo.replace("USDT","")} ${r.pct.toFixed(2)}% ${r.fuerza}

).join("");

}

function actualizarHoras(){

let baseHora=
localStorage.getItem(
"baseHora"
);

let proxima=
new Date(
parseInt(baseHora)+
(4*60*60*1000)
);

document.getElementById(
"horas"
).innerHTML=

`
Hora Base:
${new Date(
parseInt(baseHora)
).toLocaleTimeString("es-CO")}

<br>

Hora Actual:
${new Date()
.toLocaleTimeString("es-CO")}

<br>

Próxima Base:
${proxima.toLocaleTimeString("es-CO")}
`;

}

function actualizarBase(){

localStorage.removeItem(
"base"
);

localStorage.removeItem(
"baseHora"
);

location.reload();

}

cargar();

setInterval(
actualizarDatos,
5000
);

setInterval(
actualizarHoras,
60000
);




</script>

</body>
</html>
