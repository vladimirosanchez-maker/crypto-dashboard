<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Crypto Dashboard</title>

<style>

body{
background:#111;
color:white;
font-family:Arial,sans-serif;
padding:15px;
margin:0;
}

h1{
text-align:center;
font-size:32px;
margin-bottom:20px;
}

.info{
font-size:15px;
line-height:1.6;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:10px;
margin-bottom:20px;
background:#ddd;
color:#007aff;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
padding:10px 3px;
border-bottom:2px solid #333;
}

td{
padding:10px 3px;
border-bottom:1px solid #333;
text-align:center;
}

.verde{
color:#00ff88;
font-weight:bold;
}

.rojo{
color:#ff6666;
font-weight:bold;
}

.ranking{
margin-top:30px;
}

.ranking h2{
font-size:24px;
}

.ranking div{
padding:8px 0;
border-bottom:1px solid #333;
font-size:16px;
}

</style>
</head>

<body>

<h1>Crypto Dashboard</h1>

<div id="horas" class="info"></div>

<button onclick="actualizarBase()">
Actualizar Base Ahora
</button>

<table>

<thead>
<tr>
<th>Activo</th>
<th>🚦</th>
<th>Actual</th>
<th>Base</th>
<th>USD</th>
<th>%</th>
<th>Fuerza</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<div class="ranking">
<h2>🏆 Ranking de Fuerza</h2>
<div id="ranking"></div>
</div>

<script>

const activos=[
"AAVEUSDT",
"AVAXUSDT",
"BTCUSDT",
"CRVUSDT",
"DOTUSDT",
"ETHUSDT",
"LTCUSDT",
"PENGUUSDT",
"ROSEUSDT",
"SOLUSDT",
"TAOUSDT",
"XRPUSDT"
];

function formato(v){

if(v>=1000){
return Number(v).toLocaleString(
"es-CO",
{
minimumFractionDigits:2,
maximumFractionDigits:2
}
);
}

if(v>=1){
return Number(v).toLocaleString(
"es-CO",
{
minimumFractionDigits:2,
maximumFractionDigits:4
}
);
}

return Number(v).toLocaleString(
"es-CO",
{
minimumFractionDigits:6,
maximumFractionDigits:6
}
);

}

function fuerza(p){

if(p>=5) return "🔥 Muy Fuerte";
if(p>=2) return "🟢 Fuerte";
if(p>-2) return "⚪ Neutral";
if(p>-5) return "🟠 Débil";

return "🔴 Muy Débil";

}

async function cargar(){

let base=
JSON.parse(
localStorage.getItem("base")
);

let baseHora=
localStorage.getItem("baseHora");

if(!base){

base={};

for(let activo of activos){

const r=
await fetch(
`https://api.binance.com/api/v3/ticker/price?symbol=${activo}`
);

const d=
await r.json();

base[activo]=
parseFloat(d.price);

}

localStorage.setItem(
"base",
JSON.stringify(base)
);

baseHora=
Date.now();

localStorage.setItem(
"baseHora",
baseHora
);

}

const tabla=
document.getElementById("tabla");

tabla.innerHTML="";

let ranking=[];

for(let activo of activos){

const r=
await fetch(
`https://api.binance.com/api/v3/ticker/price?symbol=${activo}`
);

const d=
await r.json();

const actual=
parseFloat(d.price);

const valorBase=
base[activo];

const usd=
actual-valorBase;

const pct=
(usd/valorBase)*100;

ranking.push({
activo,
pct
});

let color=
usd>=0?"verde":"rojo";

let semaforo=
usd>=0?"🟢":"🔴";

tabla.innerHTML+=`

<tr>

<td>
${activo.replace("USDT","")}
</td>

<td>
${semaforo}
</td>

<td class="${color}">
${formato(actual)}
</td>

<td>
${formato(valorBase)}
</td>

<td class="${color}">
${usd>0?"+":""}
${formato(usd)}
</td>

<td class="${color}">
${pct.toFixed(2)}%
</td>

<td>
${fuerza(pct)}
</td>

</tr>

`;

}

ranking.sort(
(a,b)=>b.pct-a.pct
);

let htmlRanking="";

ranking.forEach((c,i)=>{

htmlRanking+=`

<div>

${i+1}. 
${c.activo.replace("USDT","")}
&nbsp;&nbsp;
${c.pct.toFixed(2)}%

</div>

`;

});

document.getElementById(
"ranking"
).innerHTML=
htmlRanking;

let proxima=
new Date(
parseInt(baseHora)+
(4*60*60*1000)
);

document.getElementById(
"horas"
).innerHTML=

`
<b>Hora Base:</b>
${new Date(
parseInt(baseHora)
).toLocaleTimeString("es-CO")}

<br>

<b>Hora Actual:</b>
${new Date()
.toLocaleTimeString("es-CO")}

<br>

<b>Próxima Base:</b>
${proxima.toLocaleTimeString("es-CO")}
`;

}

function actualizarBase(){

localStorage.removeItem(
"base"
);

localStorage.removeItem(
"baseHora"
);

cargar();

}

cargar();

setInterval(
cargar,
5000
);

</script>

</body>
</html>
