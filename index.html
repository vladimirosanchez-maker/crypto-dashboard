<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Crypto Dashboard V5</title>

<style>

body{
background:#111;
color:white;
font-family:Arial,sans-serif;
padding:15px;
margin:0;
}

h1{
text-align:center;
font-size:26px;
margin-bottom:12px;
}

.info{
font-size:15px;
line-height:1.6;
margin-bottom:20px;
text-align:center;
}

button{
width:100%;
padding:14px;
font-size:16px;
font-weight:bold;
border:none;
border-radius:10px;
margin-bottom:20px;
background:#ddd;
color:#007aff;
}


table{
width:100%;
border-collapse:collapse;
font-size:11px;
table-layout:fixed;
}

th{
padding:4px 1px;
font-size:10px;
}

td{
padding:4px 1px;
font-size:10px;
word-wrap:break-word;
overflow:hidden;
}

.verde{
color:#00ff88;
font-weight:bold;
}

.rojo{
color:#ff6666;
font-weight:bold;
}

.ranking{
margin-top:20px;
margin-bottom:20px;
}

.ranking h2{
text-align:center;
font-size:20px;
}

.ranking div{
padding:4px 0;
border-bottom:1px solid #333;
font-size:12px;
}

.ranking{
font-size:13px;
}

.ranking h2{
font-size:22px;
}

.info{
font-size:13px;
}

</style>

</head>

<body>

<h1>Crypto Dashboard V5</h1>

<div id="horas" class="info"></div>

<button onclick="actualizarBase()">
Actualizar Base Ahora
</button>

<div class="ranking">

<h2>
🏆 Ranking de Fuerza
</h2>

<div id="ranking"></div>

</div>

<table>

<thead>

<tr>
<th>Activo</th>
<th>🚦</th>
<th>Actual</th>
<th>Base</th>
<th>USD</th>
<th>%</th>
<th>Tendencia</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

<script>

const activos={

BTC:"bitcoin",
ETH:"ethereum",
SOL:"solana",
XRP:"ripple",
AAVE:"aave",
PENGU:"pudgy-penguins",
DOT:"polkadot",
AVAX:"avalanche-2",
ROSE:"oasis-network",
LTC:"litecoin",
TAO:"bittensor",
CRV:"curve-dao-token"

};

let ultimoPrecio={};
let tablaCreada=false;

function formato(v){

if(v>=1000){
return Number(v).toLocaleString(
"es-CO",
{
minimumFractionDigits:2,
maximumFractionDigits:2
}
);
}

if(v>=1){
return Number(v).toLocaleString(
"es-CO",
{
minimumFractionDigits:2,
maximumFractionDigits:4
}
);
}

return Number(v).toLocaleString(
"es-CO",
{
minimumFractionDigits:6,
maximumFractionDigits:6
}
);

}

function fuerza(p){

if(p>=5) return "🔥 Muy Fuerte";
if(p>=2) return "🟢 Fuerte";
if(p>=-2) return "🟡 Neutral";
if(p>=-5) return "🟠 Débil";

return "🔴 Muy Débil";

}

function tendencia(p){

if(p>=5) return "🚀 Explosiva";
if(p>=2) return "📈 Alcista Fuerte";
if(p>=0) return "🟢 Alcista";
if(p>=-5) return "🟠 Bajista";

return "⛔ Bajista Fuerte";

}

async function cargar(){

let base=
JSON.parse(
localStorage.getItem("base")
);

let baseHora=
localStorage.getItem("baseHora");

const ids=
Object.values(activos).join(",");

const url=
`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`;

const datos=
await fetch(url);

const precios=
await datos.json();

if(!base){

base={};

for(const [ticker,id] of Object.entries(activos)){

base[ticker]=
precios[id].usd;

}

localStorage.setItem(
"base",
JSON.stringify(base)
);

baseHora=
Date.now();

localStorage.setItem(
"baseHora",
baseHora
);

}

const tabla=
document.getElementById("tabla");

if(!tablaCreada){

for(const ticker of Object.keys(activos)){

ultimoPrecio[ticker]=
base[ticker];

tabla.innerHTML+=`

<tr>

<td>${ticker}</td>

<td id="sem_${ticker}">
⚪
</td>

<td id="actual_${ticker}">
${formato(base[ticker])}
</td>

<td>
${formato(base[ticker])}
</td>

<td id="usd_${ticker}">
0
</td>

<td id="pct_${ticker}">
0%
</td>



<td id="tendencia_${ticker}">
🟢 Alcista
</td>

</tr>

`;

}

tablaCreada=true;

}

actualizarDatos();

actualizarHoras();

}
async function actualizarDatos(){

const base=
JSON.parse(
localStorage.getItem("base")
);

const ids=
Object.values(activos).join(",");

const url=
`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`;

const datos=
await fetch(url);

const precios=
await datos.json();

let ranking=[];

for(const [ticker,id] of Object.entries(activos)){

const actual=
precios[id].usd;

const valorBase=
base[ticker];

const usd=
actual-valorBase;

const pct=
(usd/valorBase)*100;

let semaforo="⚪";

if(actual>ultimoPrecio[ticker]){
semaforo="🟢";
}

if(actual<ultimoPrecio[ticker]){
semaforo="🔴";
}

document.getElementById(
"sem_"+ticker
).innerHTML=semaforo;

document.getElementById(
"actual_"+ticker
).innerHTML=
formato(actual);

document.getElementById(
"usd_"+ticker
).innerHTML=
(usd>0?"+":"")
+
formato(usd);

document.getElementById(
"pct_"+ticker
).innerHTML=
pct.toFixed(2)+"%";


document.getElementById(
"tendencia_"+ticker
).innerHTML=
tendencia(pct);

ultimoPrecio[ticker]=actual;

ranking.push({
ticker,
pct,
fuerza:fuerza(pct)
});

}

ranking.sort(
(a,b)=>b.pct-a.pct
);

document.getElementById(
"ranking"
).innerHTML=

ranking.map((r,i)=>

`<div>
${i+1}. ${r.ticker}
&nbsp;
${r.pct.toFixed(2)}%
&nbsp;
${r.fuerza}
</div>`

).join("");

}

function actualizarHoras(){

let baseHora=
localStorage.getItem(
"baseHora"
);

if(!baseHora){
return;
}

let proxima=
new Date(
parseInt(baseHora)
+
(4*60*60*1000)
);

let restante=
proxima.getTime()
-
Date.now();

let horas=
Math.floor(
restante/3600000
);

let minutos=
Math.floor(
(restante%3600000)
/60000
);

document.getElementById(
"horas"
).innerHTML=

`
🕒 Hora Base:
${new Date(
parseInt(baseHora)
).toLocaleTimeString("es-CO")}

<br>

⏰ Próxima Base:
${proxima.toLocaleTimeString("es-CO")}

<br>

⌛ Faltan:
${horas}h ${minutos}m
`;

}

function actualizarBase(){

localStorage.removeItem(
"base"
);

localStorage.removeItem(
"baseHora"
);

location.reload();

}

cargar();

setInterval(
actualizarDatos,
30000
);

setInterval(
actualizarHoras,
60000
);

</script>

</body>

</html>
