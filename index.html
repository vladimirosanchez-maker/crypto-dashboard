<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jaime Crypto Dashboard</title>
<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:10px;
}
h1{
text-align:center;
font-size:28px;
margin-bottom:10px;
}
.info{
font-size:14px;
line-height:1.6;
margin-bottom:15px;
text-align:center;
}
button{
width:100%;
padding:12px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:10px;
margin-bottom:15px;
}
table{
width:100%;
border-collapse:collapse;
font-size:14px;
}
th{
padding:8px 3px;
border-bottom:2px solid #333;
}
td{
padding:8px 3px;
border-bottom:1px solid #333;
text-align:center;
}
.verde{
color:#00ff88;
font-weight:bold;
}
.rojo{
color:#ff5555;
font-weight:bold;
}
.blanco{
color:white;
}
</style>
</head>
<body>
<h1>Jaime Crypto Dashboard</h1>
<div id="horas" class="info"></div>
<button onclick="actualizarBase()">
Actualizar Base Ahora
</button>
<table>
<thead>
<tr>
<th>Activo</th>
<th>Actual</th>
<th>Base</th>
<th>USD</th>
<th>%</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
<script>
const activos=[
"BTCUSDT",
"ETHUSDT",
"SOLUSDT",
"XRPUSDT",
"AAVEUSDT",
"PENGUUSDT",
"DOTUSDT",
"AVAXUSDT",
"ROSEUSDT",
"LTCUSDT",
"TAOUSDT",
"CRVUSDT"
];
let ultimoPrecio={};
function formato(valor){
if(valor>=1000){
return Number(valor).toLocaleString(
"es-CO",
{
minimumFractionDigits:2,
maximumFractionDigits:2
}
);
}
if(valor>=1){
return Number(valor).toLocaleString(
"es-CO",
{
minimumFractionDigits:2,
maximumFractionDigits:4
}
);
}
return Number(valor).toLocaleString(
"es-CO",
{
minimumFractionDigits:6,
maximumFractionDigits:6
}
);
}
async function crearTabla(){
let base=
JSON.parse(localStorage.getItem("base"));
let baseHora=
localStorage.getItem("baseHora");
if(!base){
base={};
for(let activo of activos){
const r=await fetch(
`https://api.binance.com/api/v3/ticker/price?symbol=${activo}`
);
const d=await r.json();
base[activo]=parseFloat(d.price);
}
localStorage.setItem(
"base",
JSON.stringify(base)
);
baseHora=Date.now();
localStorage.setItem(
"baseHora",
baseHora
);
}
const tabla=
document.getElementById("tabla");
tabla.innerHTML="";
for(let activo of activos){
ultimoPrecio[activo]=
base[activo];
const fila=`
<tr>
<td>${activo.replace("USDT","")}</td>
<td
id="precio_${activo}"
class="blanco"
>
${formato(base[activo])}
</td>
<td>
${formato(base[activo])}
</td>
<td
id="usd_${activo}"
>
0
</td>
<td
id="pct_${activo}"
>
0%
</td>
</tr>
`;
tabla.innerHTML+=fila;
}
actualizarHoras();
}
function actualizarHoras(){
const baseHora=
parseInt(
localStorage.getItem("baseHora")
);
const vencimiento=
baseHora+
(4*60*60*1000);
const restante=
Math.max(
0,
vencimiento-Date.now()
);
const horas=
Math.floor(
restante/3600000
);
const minutos=
Math.floor(
(restante%3600000)/60000
);
document.getElementById(
"horas"
).innerHTML=
`
🕒 Base:
${new Date(baseHora)
.toLocaleTimeString('es-CO')}
<br>
⏰ Vence:
${new Date(vencimiento)
.toLocaleTimeString('es-CO')}
<br>
⌛ Faltan:
${horas}h ${minutos}m
`;
}
async function actualizarPrecios(){
const base=
JSON.parse(
localStorage.getItem("base")
);
for(let activo of activos){
try{
const r=await fetch(
`https://api.binance.com/api/v3/ticker/price?symbol=${activo}`
);
const d=await r.json();
const actual=
parseFloat(d.price);
const baseValor=
base[activo];
const usd=
actual-baseValor;
const pct=
((actual/baseValor)-1)*100;
const precioCelda=
document.getElementById(
"precio_"+activo
);
if(
actual>
ultimoPrecio[activo]
){
precioCelda.className=
"verde";
}
else if(
actual<
ultimoPrecio[activo]
){
precioCelda.className=
"rojo";
}
precioCelda.innerHTML=
formato(actual);
document.getElementById(
"usd_"+activo
).innerHTML=
(usd>0?"+":"")
+
formato(usd);
document.getElementById(
"pct_"+activo
).innerHTML=
( pct>0?"+":"")
+
pct.toFixed(2)
+
"%";
ultimoPrecio[activo]=
actual;
}catch(e){
console.log(e);
}
}
actualizarHoras();
}
function actualizarBase(){
localStorage.removeItem(
"base"
);
localStorage.removeItem(
"baseHora"
);
location.reload();
}
crearTabla();
setInterval(
actualizarPrecios,
5000
);
setInterval(
actualizarHoras,
60000
);
</script>
</body>
</html>
